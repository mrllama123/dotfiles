[python-dev]
image="quay.io/toolbx-images/ubuntu-toolbox:22.04"
additional_packages="git curl zsh wget gpg make build-essential libssl-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev llvm libncursesw5-dev xz-utils tk-dev libxml2-dev libxmlsec1-dev libffi-dev liblzma-dev fonts-noto-color-emoji"
home="/home/rowan/distrobox/python-dev"
init_hooks="ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/docker"
init_hooks="git config --global user.name 'mrllama123'"
init_hooks="git config --global user.email piesrule123@gmail.com"
