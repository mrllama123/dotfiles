[python-dev]
image="ubuntu:22.04"
additional_packages="curl git openssh-client gpg make build-essential libssl-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev llvm libncursesw5-dev xz-utils tk-dev libxml2-dev libxmlsec1-dev libffi-dev liblzma-dev fonts-noto-color-emoji"
home="${home_dir}/distrobox/python-dev"
init_hooks=sudo ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/docker;
init_hooks=sudo -u ${user} [ -d "${home_dir}/.aws" ] && [ ! -d "${home_dir}/distrobox/python-dev/.aws" ]  && sudo -u ${user} ln -s ${home_dir}/.aws ${home_dir}/distrobox/python-dev/.aws;
# init_hooks=sudo -u ${user} [ -d "${home_dir}/.ssh" ] && [ ! -d "${home_dir}/distrobox/python-dev/.ssh" ] && sudo -u ${user} ln -s ${home_dir}/.ssh ${home_dir}/distrobox/python-dev/.ssh;
init_hooks=sudo -u ${user} [ -d "${home_dir}/.asdf" ] && [ ! -d "${home_dir}/distrobox/python-dev/.asdf" ]  && sudo -u ${user}  git clone https://github.com/asdf-vm/asdf.git ${home_dir}/distrobox/python-dev/.asdf --branch v0.13.1;
init_hooks=sudo -u ${user} [ ! -d "${home_dir}/distrobox/python-dev/.oh-my-zsh" ] && curl https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh |sudo -u ${user}  bash -s  -- 'unattended';
init_hooks=sudo -u ${user} [ -f "${home_dir}/distrobox/python-dev/.zshrc.devbox" ] && sudo -u ${user} cat ${home_dir}/distrobox/python-dev/.zshrc.devbox > ${home_dir}/distrobox/python-dev/.zshrc && rm ${home_dir}/distrobox/python-dev/.zshrc.devbox;
pull=true
replace=true
